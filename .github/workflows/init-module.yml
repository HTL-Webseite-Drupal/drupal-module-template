name: Init Drupal Module from Template

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write   # <<< DAS IST DER WICHTIGE TEIL

jobs:
  init:
    if: ${{ github.run_number == 1 }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract module name from repo
        run: |
          MODULE="${GITHUB_REPOSITORY##*/}"
          echo "MODULE_NAME=$MODULE" >> $GITHUB_ENV
          echo "MODULE_CLASS=$(echo "$MODULE" | sed -r 's/(^|_)([a-z])/\U\2/g')" >> $GITHUB_ENV

      - name: Rename files
        run: |
          find . -depth -name '*MODULE_NAME*' | while read f; do
            mv "$f" "${f//MODULE_NAME/$MODULE_NAME}"
          done
          find . -depth -name '*ModuleName*' | while read f; do
            mv "$f" "${f//ModuleName/$MODULE_CLASS}"
          done

      - name: Replace placeholders
        run: |
          grep -rl --exclude-dir=.git MODULE_NAME . | xargs sed -i "s/MODULE_NAME/$MODULE_NAME/g"
          grep -rl --exclude-dir=.git ModuleName . | xargs sed -i "s/ModuleName/$MODULE_CLASS/g"
          
      - name: Clean up corrupted git index if present
        run: |
          if [ -f .git/index ]; then
            rm .git/index
            git reset
          fi
          
      - name: Commit initialized module
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Initialize Drupal module ($MODULE_NAME)"

      - name: Remove init workflow
        run: |
          rm .github/workflows/init-module.yml
          git add .github/workflows/init-module.yml
          git commit -m "Remove init workflow"
          git push
